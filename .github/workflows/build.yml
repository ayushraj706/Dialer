name: Build Release APK (Auto-Signed)

on:
  workflow_dispatch:
  push:
    branches:
      - 'main'
    paths-ignore:
      - 'README.md'
      - '.github/**/*.md'

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      # Android ke liye JDK 17 sabse stable hai
      - name: set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: 17
          distribution: "temurin"
          cache: 'gradle'

      # Linux environment mein gradlew ko run karne ki permission dena
      - name: Make gradlew executable
        run: chmod +x ./gradlew

      # Dummy file banane ke liye
      - name: Create dummy local.properties
        run: touch local.properties

      # Corrupt Wrapper Fix
      - name: Fix Corrupted Gradle Wrapper
        run: gradle wrapper

      # 👇 YAHAN BADLAAV KIYA HAI (Sirf FOSS version build karega, Huawei ko ignore karega) 👇
      - name: Build FOSS release APK
        run: ./gradlew app:assembleFossRelease

      # On-the-fly Keystore banakar APK ko sign karna
      - name: Generate Keystore, Zipalign & Sign APK
        run: |
          # 1. Virtual Keystore generate karega
          keytool -genkey -v -keystore release.keystore -alias rightdialer -keyalg RSA -keysize 2048 -validity 10000 -storepass android123 -keypass android123 -dname "CN=RightDialer,O=Developer,C=IN"
          
          # 2. Build Tools aur APK Path set karega
          BUILD_TOOLS_DIR=$(ls -d $ANDROID_HOME/build-tools/* | tail -1)
          
          # 👇 YAHAN PATH BADLA HAI (Kyunki ab APK foss folder mein banega) 👇
          APK_DIR="app/build/outputs/apk/foss/release"
          
          # 3. Jo Unsigned APK banega, usko automatically dhoondega
          TARGET_APK=$(find $APK_DIR -name "*.apk" | head -n 1)
          
          echo "Found APK to sign: $TARGET_APK"
          
          # 4. Zipalign for performance & Android strict rules
          $BUILD_TOOLS_DIR/zipalign -v -p 4 "$TARGET_APK" $APK_DIR/aligned.apk
          
          # 5. Apksigner (V2/V3 signatures ke sath)
          $BUILD_TOOLS_DIR/apksigner sign --ks release.keystore --ks-pass pass:android123 --key-pass pass:android123 --out $APK_DIR/RightDialer-Signed-Release.apk $APK_DIR/aligned.apk

      # Signed APK ko download ke liye upload karna
      - name: Upload Signed APK
        uses: actions/upload-artifact@v4
        with:
          name: RightDialer-Signed-APK
          # 👇 YAHAN BHI PATH BADLA HAI 👇
          path: app/build/outputs/apk/foss/release/RightDialer-Signed-Release.apk
          
